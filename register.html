<html lang="hi">

  <meta charset="UTF-8">

<body>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- AUTH CONTAINER — SPLIT SCREEN LAYOUT                          -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div class="auth-container">

    <!-- ─── LEFT PANEL — BRANDING ─────────────────────────────────── -->
    <div class="auth-left">
      <!-- Floating decorative circles -->
      <div class="floating-circle circle-1"></div>
      <div class="floating-circle circle-2"></div>
      <div class="floating-circle circle-3"></div>
      <div class="floating-circle circle-4"></div>
      <div class="floating-circle circle-5"></div>
      <div class="floating-circle circle-6"></div>

      <!-- Branding content -->
      <div class="auth-branding">
        <img src="assets/logo.png" alt="HC Steno Wala Logo" class="auth-logo">
        <h1 class="auth-brand-name">HC Steno Wala</h1>
        <p class="auth-tagline">स्टेनोग्राफी की तैयारी करें, अभ्यास करें और सफल हों!</p>
      </div>

      <!-- Left panel footer -->
      <div class="auth-left-footer">
        <p>📍 Jodhpur, Rajasthan</p>
      </div>
    </div>

    <!-- ─── RIGHT PANEL — REGISTER FORM ───────────────────────────── -->
    <div class="auth-right">
      <div class="auth-form-card">

        <!-- Heading -->
        <div class="auth-heading">
          <span class="auth-icon">📝</span>
          <h2>Create Account</h2>
          <p>नया अकाउंट बनाएं और अभ्यास शुरू करें</p>
        </div>

        <!-- Register Form -->
        <form class="auth-form" id="register-form" autocomplete="off" novalidate>

          <!-- Full Name -->
          <div class="form-group">
            <div class="input-icon-wrapper">
              <input 
                type="text" 
                class="form-control" 
                id="register-name" 
                placeholder="Full Name (पूरा नाम)"
                required
                autocomplete="name"
              >
              <span class="input-icon">👤</span>
            </div>
            <p class="form-error" id="register-name-error"></p>
          </div>

          <!-- Mobile Number -->
          <div class="form-group">
            <div class="input-icon-wrapper">
              <input 
                type="tel" 
                class="form-control" 
                id="register-mobile" 
                placeholder="Mobile Number (मोबाइल नंबर)"
                maxlength="10"
                pattern="[0-9]{10}"
                required
                autocomplete="tel"
              >
              <span class="input-icon">📱</span>
            </div>
            <p class="form-error" id="register-mobile-error"></p>
          </div>

          <!-- Email -->
          <div class="form-group">
            <div class="input-icon-wrapper">
              <input 
                type="email" 
                class="form-control" 
                id="register-email" 
                placeholder="Email Address (ईमेल)"
                required
                autocomplete="email"
              >
              <span class="input-icon">📧</span>
            </div>
            <p class="form-error" id="register-email-error"></p>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="input-icon-wrapper">
              <input 
                type="password" 
                class="form-control" 
                id="register-password" 
                placeholder="Password (पासवर्ड)"
                minlength="6"
                required
                autocomplete="new-password"
              >
              <span class="input-icon">🔒</span>
              <button type="button" class="password-toggle" id="register-toggle-password" aria-label="Toggle password visibility">👁️</button>
            </div>
            <p class="form-text">कम से कम 6 अक्षर</p>
            <p class="form-error" id="register-password-error"></p>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <div class="input-icon-wrapper">
              <input 
                type="password" 
                class="form-control" 
                id="register-confirm-password" 
                placeholder="Confirm Password (पासवर्ड दोबारा)"
                minlength="6"
                required
                autocomplete="new-password"
              >
              <span class="input-icon">🔐</span>
              <button type="button" class="password-toggle" id="register-toggle-confirm-password" aria-label="Toggle password visibility">👁️</button>
            </div>
            <p class="form-error" id="register-confirm-password-error"></p>
          </div>

          <!-- Register Button -->
          <button type="submit" class="auth-submit-btn" id="register-submit-btn">
            REGISTER
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>या</span>
        </div>

        <!-- Login Link -->
        <div class="auth-switch">
          <p>Already have an account? <a href="index.html">Sign In</a></p>
        </div>

        <!-- Social Links -->

        </div>

        <!-- Contact Number -->
        <div class="auth-contact">
          📞 <a href="tel:+919799867629">9799867629</a>
        </div>

      </div>
    </div>
  </div>
