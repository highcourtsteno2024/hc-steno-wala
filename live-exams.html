<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Exams - HC Steno Wala</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="main-navbar" class="navbar" aria-label="Main navigation"></nav>

    <main class="container">
        <div class="header-section">
            <span class="subtitle">TAKE THE LIVE TEST</span>
            <h1 class="page-title">Live Exam Bundles</h1>
            <p class="page-description">Experience the full 3-phase exam environment (Steno, Typing, Word) with live timers!</p>
        </div>

        <div class="filter-bar" style="background: #fffdd4;">
            <p style="margin: 0; color: #d97706; font-weight: 600;">⚠ Live Exams are time-bound and cannot be paused once started. Please ensure you have at least 1 hour before starting.</p>
        </div>

        <div id="test-grid" class="test-grid">
            <div class="text-center" style="grid-column: 1 / -1; padding: 40px;">
                <div class="loading-spinner"></div>
                <p>Loading live exams...</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/live-exams.js"></script>
</body>
</html>
